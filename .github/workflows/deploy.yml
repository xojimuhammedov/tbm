name: CI/CD + Server Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Kodni yuklab olish
        uses: actions/checkout@v4

      - name: 🧰 Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      #      - name: 📥 Dependency o'rnatish
      #        run: npm ci
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: 🏗️ Build yaratish
        run: npm run build
        env:
          VITE_EIMZO_API_KEY: ${{ secrets.VITE_EIMZO_API_KEY }}
          VITE_EIMZO_BASE_URL: ${{ secrets.VITE_EIMZO_BASE_URL }}
          VITE_APP_NAME: ${{secrets.VITE_APP_NAME}}
          VITE_APP_LOGO: ${{secrets.VITE_APP_LOGO}}
          VITE_APP_LOGO_MIN: ${{secrets.VITE_APP_LOGO_MIN}}
          VITE_OWNER_URL: ${{secrets.VITE_OWNER_URL}}
          VITE_OWNER_NAME: ${{secrets.VITE_OWNER_NAME}}
          VITE_SIGNED: ${{secrets.VITE_SIGNED}}
          VITE_DEFAULT_LOCALE: ${{secrets.VITE_DEFAULT_LOCALE}}
          VITE_DEFAULT_NS: ${{secrets.VITE_DEFAULT_NS}}
          VITE_VALIDATION_NS: ${{secrets.VITE_VALIDATION_NS}}
          VITE_ERROR_NS: ${{secrets.VITE_ERROR_NS}}

      - name: 📤 Kodni yuklash
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Build artifactni yuklab olish
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: 🔐 SSH kalitni tayyorlash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_SECRET_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: 🚀 Serverga deploy qilish
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            dist/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET }}/"

      - name: ✅ Deploy muvaffaqiyatli
        run: echo "Deploy completed successfully!"

      - name: 🧹 SSH kalitni tozalash
        if: always()
        run: rm -f ~/.ssh/id_ed25519
